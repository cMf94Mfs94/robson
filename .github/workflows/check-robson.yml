name: "Check Robson Hut Availability"

on:
  schedule:
    # every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      test_email:
        description: 'Send test email regardless of threshold'
        required: false
        default: 'false'

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      - name: Cache Playwright browsers
        uses: actions/cache@v3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
      - name: Install system dependencies (cache miss only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install-deps
      - name: Install dependencies
        run: |
          npm install --audit-level=none
          npx playwright install
      - name: Run availability script
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          TEST_EMAIL: ${{ github.event.inputs.test_email }}
          VERBOSE: ${{ secrets.VERBOSE }}
          EMAIL_SPACE_THRESHOLD: ${{ secrets.EMAIL_SPACE_THRESHOLD || '2' }}
          CONSECUTIVE_AVAILABLE_DAYS_THRESHOLD: ${{ secrets.CONSECUTIVE_AVAILABLE_DAYS_THRESHOLD || '1' }}
          IGNORED_DATES: ${{ secrets.IGNORED_DATES || 'July 19, August 3, 5' }}
        run: node index.html
